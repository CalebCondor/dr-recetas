name: Sync DynamicServices

on:
  schedule:
    - cron: '0 4 * * 1' # Runs weekly on Monday at 04:00 UTC
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        env:
          DYNAMIC_SERVICES_URL: ${{ secrets.DYNAMIC_SERVICES_URL }}
        run: |
          node ./scripts/sync-dynamic-services.js

      - name: Commit and push changes (if any)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add messages/es.json
            git commit -m "chore: sync DynamicServices from remote"
            git push
          else
            echo "No changes to commit"
          fi
